version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 (App Router)
  - ui_library: Tailwind CSS v4, React 19
  - other: "@dnd-kit, Better Auth, Recharts, pokedex-promise-v2, Bun"
routes:
  - path: /
    file: frontend/app/page.tsx
    auth_required: false
    description: Landing page with hero section, features showcase, and CTA buttons
  - path: /play
    file: frontend/app/play/page.tsx
    auth_required: false
    description: Game selector - pick from 5 mainline Pokemon games (Gens 1-5)
  - path: /game/[generation]
    file: frontend/app/game/[generation]/page.tsx
    auth_required: false
    description: Main team builder - RSC page that statically generates team builder for each generation
  - path: /auth
    file: frontend/app/auth/page.tsx
    auth_required: false
    description: Authentication page with Sign In and Sign Up tabs
  - path: /teams
    file: frontend/app/teams/page.tsx
    auth_required: true
    description: My Teams dashboard - view and manage all saved teams grouped by generation
  - path: /u/[username]
    file: frontend/app/u/[username]/page.tsx
    auth_required: false
    description: Public trainer profile page with bio, favorite games/Pokemon, and saved teams
  - path: /settings
    file: frontend/app/settings/page.tsx
    auth_required: true
    description: Settings hub with Privacy Controls, Account settings, and Legal links
  - path: /settings/profile
    file: frontend/app/settings/profile/page.tsx
    auth_required: true
    description: Profile customization - edit username, bio, avatar, favorite games/Pokemon, featured team
  - path: /settings/admin
    file: frontend/app/settings/admin/page.tsx
    auth_required: true
    description: Admin dashboard restricted to ADMIN/OWNER roles
  - path: /privacy
    file: frontend/app/privacy/page.tsx
    auth_required: false
    description: Privacy policy page with cookie preferences
  - path: /terms
    file: frontend/app/terms/page.tsx
    auth_required: false
    description: Terms of service page
features:
  - name: Game Selection
    description: User selects a mainline Pokemon game (Gens 1-5) to start building a team
    files:
      - frontend/app/play/page.tsx
    entry_route: /play
    user_interactions:
      - View grid of available Pokemon games
      - Click on a game card to navigate to the team builder for that game
    api_calls: []
    auth_required: false
  - name: Pokemon Team Builder
    description: Build a 6-Pokemon team using drag-and-drop, search, and filter by version/dex
    files:
      - frontend/app/game/[generation]/page.tsx
      - frontend/app/game/TeamBuilder.tsx
      - frontend/app/game/PokemonSelection.tsx
      - frontend/app/game/TeamPanel.tsx
      - frontend/app/game/TeamSlot.tsx
    entry_route: /game/gen1
    user_interactions:
      - Search for Pokemon by name in the search bar
      - Toggle between regional and national Pokedex mode
      - Filter Pokemon by game version exclusives
      - Click or drag a Pokemon to add it to a team slot
      - Remove a Pokemon from a team slot by clicking the remove button
      - Drag Pokemon between team slots to reorder
      - Undo/redo team changes using keyboard shortcut or button
    api_calls: []
    auth_required: false
  - name: Defensive Type Coverage
    description: Heatmap visualization showing team weaknesses and resistances across all 18 types
    files:
      - frontend/app/game/DefensiveCoverage.tsx
      - frontend/lib/teamAnalysis.ts
      - frontend/lib/constants.ts
    entry_route: /game/gen1
    user_interactions:
      - View defensive coverage heatmap when team has at least one Pokemon
      - Hover over type cells to see weakness/resistance counts
    api_calls: []
    auth_required: false
  - name: Offensive Type Coverage
    description: Shows which types the team can hit super-effectively (STAB coverage)
    files:
      - frontend/app/game/OffensiveCoverage.tsx
      - frontend/lib/teamAnalysis.ts
    entry_route: /game/gen1
    user_interactions:
      - View offensive coverage after adding Pokemon to team
      - See which types the team covers offensively
    api_calls: []
    auth_required: false
  - name: Team Recommendations (Smart Picks)
    description: Recommends Pokemon that best patch team weaknesses based on type analysis
    files:
      - frontend/app/game/TeamRecommendations.tsx
      - frontend/lib/teamAnalysis.ts
    entry_route: /game/gen1
    user_interactions:
      - View recommended Pokemon filtered by team composition
      - Click a recommended Pokemon to add it to the team
    api_calls: []
    auth_required: false
  - name: Battle Planner
    description: Analyze team matchups against gym leaders, Elite 4, and Champion with win predictions
    files:
      - frontend/app/game/battle/BattlePlannerTab.tsx
      - frontend/app/game/battle/BossPresetPicker.tsx
      - frontend/app/game/battle/OpponentTeamEditor.tsx
      - frontend/app/game/battle/MatchupMatrix.tsx
      - frontend/app/game/battle/MatchupAssignments.tsx
    entry_route: /game/gen1
    user_interactions:
      - Open Battle Planner tab
      - Select a boss preset (gym/elite4/champion) or create manual opponent team
      - View matchup matrix showing win/loss predictions for each pairing
      - View recommended slot assignments for maximum win probability
      - Toggle between Strict (game rules) and Sandbox (analysis) realism modes
      - Save custom opponent teams for reuse
    api_calls:
      - method: GET
        endpoint: /api/battle/presets
      - method: POST
        endpoint: /api/battle/matchups/analyze
    auth_required: false
  - name: Capture Guide
    description: Shows where to find/capture each team Pokemon in the selected game version
    files:
      - frontend/app/game/TeamCaptureGuide.tsx
    entry_route: /game/gen1
    user_interactions:
      - Select a game version from the version filter
      - View capture locations for each Pokemon in the team
    api_calls: []
    auth_required: false
  - name: AI Coach Panel
    description: AI chat assistant with contextual team analysis and coaching advice
    files:
      - frontend/app/game/AiCoachPanel.tsx
    entry_route: /game/gen1
    user_interactions:
      - Open the AI Coach panel
      - Send a message about the team or strategy
      - Receive AI response with team-specific advice
      - Request team analysis
      - View usage quota indicator
    api_calls:
      - method: GET
        endpoint: /api/ai/messages
      - method: POST
        endpoint: /api/ai/chat
      - method: POST
        endpoint: /api/ai/analyze
      - method: GET
        endpoint: /api/ai/usage
    auth_required: false
  - name: Save and Load Teams
    description: Persist teams to backend and reload them across sessions
    files:
      - frontend/app/game/SavedTeamsPanel.tsx
      - frontend/lib/api.ts
    entry_route: /game/gen1
    user_interactions:
      - Click Save Team button
      - Enter team name
      - View list of saved teams
      - Load a saved team by clicking it
      - Delete a saved team with confirmation
    api_calls:
      - method: GET
        endpoint: /api/teams
      - method: POST
        endpoint: /api/teams
      - method: PUT
        endpoint: /api/teams/{id}
      - method: DELETE
        endpoint: /api/teams/{id}
    auth_required: true
  - name: My Teams Dashboard
    description: View and manage all saved teams grouped by game generation
    files:
      - frontend/app/teams/page.tsx
    entry_route: /teams
    user_interactions:
      - View all saved teams grouped by generation
      - See team card with Pokemon sprites and type badges
      - Click Open in Builder to load team in the team builder
      - Delete a team with two-click confirmation safety
    api_calls:
      - method: GET
        endpoint: /api/teams
      - method: DELETE
        endpoint: /api/teams/{id}
    auth_required: true
  - name: User Authentication
    description: Sign in or sign up with email/username and password
    files:
      - frontend/app/auth/page.tsx
      - frontend/lib/api.ts
    entry_route: /auth
    user_interactions:
      - Select Sign In or Sign Up tab
      - Fill in email or username field
      - Fill in password field
      - For Sign Up, fill in username and confirm password
      - Click submit button
      - See error message on invalid credentials
      - See real-time username availability indicator during sign up
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/email
      - method: POST
        endpoint: /api/auth/sign-up/email
      - method: GET
        endpoint: /api/auth/check-username
    auth_required: false
  - name: Public Trainer Profile
    description: View a user's public profile with bio, favorites, and shared teams
    files:
      - frontend/app/u/[username]/page.tsx
    entry_route: /u/ashketchum
    user_interactions:
      - View trainer avatar with frame styling
      - See bio and member since date
      - View favorite games and Pokemon
      - Browse all public saved teams
      - View featured team
    api_calls:
      - method: GET
        endpoint: /api/profile/{username}
    auth_required: false
  - name: Profile Settings
    description: Customize user profile including avatar, username, bio, and favorites
    files:
      - frontend/app/settings/profile/page.tsx
    entry_route: /settings/profile
    user_interactions:
      - Change username with real-time availability check
      - Edit bio with character counter
      - Select avatar from picker with frame options
      - Choose up to 5 favorite games
      - Select up to 8 favorite Pokemon
      - Set a featured team
      - Copy public profile URL
      - Save all changes
    api_calls:
      - method: GET
        endpoint: /api/profile/me
      - method: PUT
        endpoint: /api/profile/me
    auth_required: true
  - name: Onboarding Tour
    description: Interactive walkthrough for new users to learn key features
    files:
      - frontend/app/game/OnboardingTour.tsx
    entry_route: /game/gen1
    user_interactions:
      - View onboarding tooltip overlay on first visit
      - Click Next to advance through tour steps
      - Click Skip to dismiss the tour
    api_calls: []
    auth_required: false
  - name: Command Palette
    description: Keyboard-driven quick navigation and action launcher (Cmd+K)
    files:
      - frontend/app/game/CommandPalette.tsx
    entry_route: /game/gen1
    user_interactions:
      - Press Cmd+K to open command palette
      - Type to search commands or Pokemon
      - Press Enter or click to execute command
      - Press Escape to close
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Admin CRUD operations may be UI-only and not fully connected to backend
    location: frontend/app/settings/admin/page.tsx
    impact: Some admin actions might only update local state
  - issue: AI Coach requires usage quota; heavy users may hit rate limits
    location: frontend/app/game/AiCoachPanel.tsx
    impact: AI coaching features unavailable after quota exceeded
  - issue: Battle Planner presets only available for Gen 3 Hoenn games currently
    location: frontend/app/game/battle/BattlePlannerTab.tsx
    impact: Battle preset picker limited to specific games; manual input required for others
